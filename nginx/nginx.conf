events {}

http {

    upstream frontend1 {
        server frontend-1:80;
    }

    upstream frontend2 {
        server frontend-2:80;
    }

    # -----------------------------
    # HTTP → HTTPS Redirect
    # -----------------------------
    server {
        listen 80;

        return 301 https://$host$request_uri;
    }

    server {
       # listen 80;

        listen 443 ssl;

        # SSL Certificates
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern TLS versions
        ssl_protocols TLSv1.2 TLSv1.3;


        # Route by path
        location /app1/ {
            proxy_pass http://frontend1/;
        }

        location /app2/ {
            proxy_pass http://frontend2/;
        }
    }
}