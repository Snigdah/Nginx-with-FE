version: "3.9"

services:

  frontend-1:
    image: frontend1:0.0.2
    container_name: frontend-1
    networks:
      - frontend-network

  frontend-2:
    image: frontend2:0.0.2
    container_name: frontend-2
    networks:
      - frontend-network

  nginx:
    image: nginx:alpine
    container_name: main-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend-1
      - frontend-2
    networks:
      - frontend-network

networks:
  frontend-network:
    driver: bridge